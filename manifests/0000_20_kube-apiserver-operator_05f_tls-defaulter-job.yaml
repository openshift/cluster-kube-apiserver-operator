apiVersion: batch/v1
kind: Job
metadata:
  namespace: openshift-kube-apiserver-operator
  name: tls-security-profile-defaulter
  annotations:
    include.release.openshift.io/ibm-cloud-managed: "false"
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
    release.openshift.io/feature-gate: "TLSSecurityProfileModernDefault"
spec:
  activeDeadlineSeconds: 300
  backoffLimit: 5
  template:
    metadata:
      name: tls-security-profile-defaulter
      annotations:
        target.workload.openshift.io/management: '{"effect": "PreferredDuringScheduling"}'
    spec:
      serviceAccountName: tls-security-profile-defaulter
      restartPolicy: OnFailure
      hostUsers: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: defaulter
        image: quay.io/openshift/origin-cli:v4.0
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        command:
        - /bin/bash
        - /scripts/defaulter.sh
        env:
        - name: HOME
          value: /tmp
        resources:
          requests:
            memory: 50Mi
            cpu: 10m
        volumeMounts:
        - name: scripts
          mountPath: /scripts
          readOnly: true
        - name: tmp
          mountPath: /tmp
        terminationMessagePolicy: FallbackToLogsOnError
      volumes:
      - name: scripts
        configMap:
          name: tls-security-profile-defaulter-script
      - name: tmp
        emptyDir: {}
      nodeSelector:
        node-role.kubernetes.io/master: ""
      priorityClassName: "system-cluster-critical"
      tolerations:
      - key: "node-role.kubernetes.io/master"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoExecute"
      - key: "node.kubernetes.io/unreachable"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: 120
      - key: "node.kubernetes.io/not-ready"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: 120
